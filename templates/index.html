<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel - Kursga yozilganlar</title>
    <style>
        body { font-family: sans-serif; margin: 50px; background-color: #f4f4f9; }
        h2 { color: #333; text-align: center; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 0 20px rgba(0,0,0,0.1); }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background-color: #009879; color: white; }
        tr:hover { background-color: #f5f5f5; }
    </style>
</head>
<body>
    <h2>📚 Kursga yozilgan foydalanuvchilar ro'yxati</h2>
    <table>
        <thead>
            <tr>
                <th>Telegram ID</th>
                <th>Foydalanuvchi ismi</th>
                <th>Tanlangan kurs</th>
            </tr>
        </thead>
        <tbody>
            {% for user in users %}
            <tr>
                <td>{{ user['user_id'] }}</td>
                <td>{{ user['ism'] }}</td>
                <td>{{ user['kurs'] }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
